<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<title>Evakuasi Murid</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f2f2f2;
}

.header {
    background: #d32f2f;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 20px;
}

.container {
    padding: 10px;
}

.stats {
    display: flex;
    justify-content: space-around;
    margin: 10px 0;
    font-weight: bold;
}

select, input {
    width: 100%;
    padding: 12px;
    margin-bottom: 10px;
    font-size: 16px;
}

.student {
    background: white;
    margin-bottom: 8px;
    padding: 12px;
    border-radius: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 16px;
}

.student.missing {
    background: #ffe5e5;
}

.btn {
    padding: 12px;
    width: 100%;
    border: none;
    font-size: 16px;
    border-radius: 8px;
    margin-top: 5px;
}

.export { background: #4caf50; color: white; }
.reset { background: #ff9800; color: white; }
</style>
</head>

<body>

<div class="header">🚨 Evakuasi Murid</div>

<div class="container">

<select id="kelasFilter" onchange="renderList()">
<option value="all">Semua Kelas</option>
</select>

<input type="text" id="search" placeholder="Cari nama..." oninput="renderList()">

<div class="stats">
<div>✅ Hadir: <span id="hadir">0</span></div>
<div>❌ Hilang: <span id="missing">0</span></div>
</div>

<div id="list"></div>

<button class="btn export" onclick="exportMissing()">📤 Export Murid Hilang</button>
<button class="btn reset" onclick="resetAll()">🔄 Reset</button>

</div>

<script>

// ================= DATA =================
const students = [
{nama:"AISH MUHAMMAD BIN AZIZI", kelas:"6 Amanah"},
{nama:"KHAIRUL ANAM BIN KHAIRUL AKMAL", kelas:"6 Amanah"},
{nama:"AINUL MARDHIYAH BINTI ROSHIDI", kelas:"6 Bestari"},
{nama:"NUR AINUN HUMAIRA BINTI MOHAMAD SHAMIN", kelas:"6 Bestari"},
{nama:"DAUD BIN MUSA", kelas:"6 Cemerlang"},
{nama:"MUHAMMAD ADAM DARWISY BIN MOHAMAD FAZIANANUAR", kelas:"6 Cemerlang"}
];

// ================= INIT =================
let status = JSON.parse(localStorage.getItem("status")) || {};

const kelasSet = [...new Set(students.map(s => s.kelas))];
const select = document.getElementById("kelasFilter");

kelasSet.forEach(k => {
    let opt = document.createElement("option");
    opt.value = k;
    opt.textContent = k;
    select.appendChild(opt);
});

// ================= RENDER =================
function renderList() {
    const list = document.getElementById("list");
    list.innerHTML = "";

    const keyword = document.getElementById("search").value.toLowerCase();
    const kelas = document.getElementById("kelasFilter").value;

    let hadir = 0;

    students.forEach((s, i) => {
        if ((kelas !== "all" && s.kelas !== kelas) ||
            !s.nama.toLowerCase().includes(keyword)) return;

        const div = document.createElement("div");
        div.className = "student";

        const checked = status[i] || false;
        if (!checked) div.classList.add("missing");

        div.innerHTML = `
            <span>${s.nama} <br><small>${s.kelas}</small></span>
            <input type="checkbox" ${checked ? "checked" : ""}>
        `;

        div.querySelector("input").onchange = (e) => {
            status[i] = e.target.checked;
            localStorage.setItem("status", JSON.stringify(status));
            renderList();
        };

        if (checked) hadir++;

        list.appendChild(div);
    });

    document.getElementById("hadir").innerText = hadir;
    document.getElementById("missing").innerText = students.length - hadir;
}

// ================= EXPORT =================
function exportMissing() {
    let missing = students
        .map((s, i) => (!status[i] ? s.nama + " ("+s.kelas+")" : null))
        .filter(x => x);

    let text = "MURID BELUM DIJUMPA:\n\n" + missing.join("\n");

    let blob = new Blob([text], { type: "text/plain" });
    let url = URL.createObjectURL(blob);

    let a = document.createElement("a");
    a.href = url;
    a.download = "murid_hilang.txt";
    a.click();
}

// ================= RESET =================
function resetAll() {
    if(confirm("Reset semua kehadiran?")) {
        status = {};
        localStorage.removeItem("status");
        renderList();
    }
}

renderList();

</script>

</body>
</html>
