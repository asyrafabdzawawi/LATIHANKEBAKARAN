<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f2f2f2;
}

/* HEADER */
.header {
    background: #d32f2f;
    color: white;
    padding: 18px;
    text-align: center;
    font-size: 20px;
    font-weight: bold;
    position: sticky;
    top: 0;
    z-index: 1000;
}

/* CONTAINER */
.container {
    padding: 10px;
    max-width: 600px;
    margin: auto;
}

/* STATS */
.stats {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    margin: 10px 0;
}

.stats div {
    flex: 1;
    background: white;
    padding: 12px;
    border-radius: 10px;
    text-align: center;
    font-size: 16px;
}

/* INPUT */
select, input {
    width: 100%;
    padding: 14px;
    margin-bottom: 10px;
    font-size: 16px;
    border-radius: 10px;
    border: 1px solid #ccc;
}

/* STUDENT CARD */
.student {
    background: white;
    margin-bottom: 10px;
    padding: 14px;
    border-radius: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 16px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.05);
}

/* MISSING */
.student.missing {
    background: #ffe5e5;
    border-left: 6px solid red;
}

/* CHECKBOX BESAR */
.student input[type="checkbox"] {
    width: 28px;
    height: 28px;
}

/* BUTTON */
.btn {
    padding: 14px;
    width: 100%;
    border: none;
    font-size: 16px;
    border-radius: 10px;
    margin-top: 6px;
}

.export { background: #4caf50; color: white; }
.reset { background: #ff9800; color: white; }

/* MOBILE POWER MODE */
@media (max-width: 480px) {

    .header {
        font-size: 18px;
        padding: 15px;
    }

    .student {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
    }

    .student input {
        align-self: flex-end;
    }

    .stats div {
        font-size: 14px;
        padding: 10px;
    }

}
</style>
</head>

<div class="header">🚨 Evakuasi Murid</div>

// ================= INIT =================
let status = {};

db.ref("status").on("value", snapshot => {
    status = snapshot.val() || {};
    renderList();
});

const kelasSet = [...new Set(students.map(s => s.kelas))];
const select = document.getElementById("kelasFilter");

kelasSet.forEach(k => {
    let opt = document.createElement("option");
    opt.value = k;
    opt.textContent = k;
    select.appendChild(opt);
});

// ================= RENDER =================
function renderList() {
    const list = document.getElementById("list");
    list.innerHTML = "";

    const keyword = document.getElementById("search").value.toLowerCase();
    const kelas = document.getElementById("kelasFilter").value;

    let hadir = 0;
    let totalView = 0;

    students.forEach((s, i) => {
        if ((kelas !== "all" && s.kelas !== kelas) ||
            !s.nama.toLowerCase().includes(keyword)) return;

        const div = document.createElement("div");
        div.className = "student";

        const id = (s.kelas + "_" + s.nama).replace(/\s/g, "_");
        const checked = status[id] || false;
        if (!checked) div.classList.add("missing");

        div.innerHTML = `
            <span>${s.nama} <br><small>${s.kelas}</small></span>
            <input type="checkbox" ${checked ? "checked" : ""}>
        `;

        div.querySelector("input").onchange = (e) => {
            const id = (s.kelas + "_" + s.nama).replace(/\s/g, "_");
            db.ref("status/" + id).set(e.target.checked);
        };

        if (checked) hadir++;
        totalView++;

        list.appendChild(div);
    });

    document.getElementById("hadir").innerText = hadir;
    document.getElementById("missing").innerText = totalView - hadir;
}

// ================= EXPORT =================


function exportMissing() {
    let missing = students
        .map((s) => {
            const id = (s.kelas + "_" + s.nama).replace(/\s/g, "_");
            return !status[id] ? s.nama + " (" + s.kelas + ")" : null;
        })
        .filter(x => x);

    let text = "MURID BELUM DIJUMPA:\n\n" + missing.join("\n");

    let blob = new Blob([text], { type: "text/plain" });
    let url = URL.createObjectURL(blob);

    let a = document.createElement("a");
    a.href = url;
    a.download = "murid_hilang.txt";
    a.click();
}
// ================= RESET =================
function resetAll() {
    if(confirm("Reset semua kehadiran?")) {
        db.ref("status").remove();
    }
}
